<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 March Madness – My Picks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      min-height: 100vh;
      padding: 16px 8px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffd700;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 12px;
    }

    /* ─── Status bar: legend + refresh ──────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #8b949e;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .swatch-fav    { background: linear-gradient(135deg, #ffd700, #ffb300); }
    .swatch-upset  { background: linear-gradient(135deg, #ff6b35, #e64a19); }
    .swatch-normal { background: #161b22; border: 1px solid #30363d; }
    .swatch-won    { background: #0d1117; border: 1px solid #3fb950; }
    .swatch-lost   { background: #1a0a0a; border: 1px solid #8b1a1a; }

    .divider { color: #30363d; }

    .refresh-btn {
      background: #161b22;
      border: 1px solid #30363d;
      color: #58a6ff;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .refresh-btn:hover:not(:disabled) {
      background: #21262d;
      border-color: #58a6ff;
    }

    .refresh-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .spin-icon {
      display: inline-block;
      font-size: 14px;
      line-height: 1;
    }

    .spin-icon.spinning {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .sync-status {
      font-size: 11px;
      color: #8b949e;
      text-align: center;
      margin-top: 4px;
      min-height: 16px;
    }

    .sync-status.error { color: #f78166; }
    .sync-status.ok    { color: #3fb950; }

    /* ─── Scrollable bracket wrapper ────────────────────────────── */
    .bracket-scroll {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 16px;
    }

    .bracket-outer {
      display: inline-flex;   /* shrink-wrap to content width */
      align-items: flex-start;
      gap: 0;
      padding: 0 8px;
    }

    /* ─── Left / Right halves ────────────────────────────────────── */
    .half {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .region-block {
      display: flex;
    }


    /* ─── Region label ───────────────────────────────────────────── */
    .region-label {
      writing-mode: vertical-lr;
      text-transform: uppercase;
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 2px;
      color: #8b949e;
      padding: 6px 4px;
      text-align: center;
      user-select: none;
    }

    .region-label.east    { color: #58a6ff; }
    .region-label.west    { color: #3fb950; }
    .region-label.south   { color: #f78166; }
    .region-label.midwest { color: #d2a8ff; }

    /* ─── Round column ───────────────────────────────────────────── */
    .round-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      width: 148px;
      min-height: 352px;
      position: relative;
    }

    .round-col.r2  { min-height: 352px; width: 130px; }
    .round-col.s16 { min-height: 352px; width: 130px; }
    .round-col.e8  { min-height: 352px; width: 130px; }

    /* ─── Match ──────────────────────────────────────────────────── */
    .match {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .half.left .match::after {
      content: '';
      position: absolute;
      right: -1px; top: 25%;
      height: 50%; width: 0;
      border-right: 2px solid #30363d;
      border-top:   2px solid #30363d;
      border-bottom:2px solid #30363d;
      border-radius: 0 3px 3px 0;
      z-index: 0;
    }

    .half.right .match::after {
      content: '';
      position: absolute;
      left: -1px; top: 25%;
      height: 50%; width: 0;
      border-left:  2px solid #30363d;
      border-top:   2px solid #30363d;
      border-bottom:2px solid #30363d;
      border-radius: 3px 0 0 3px;
      z-index: 0;
    }

    .half.left  .e8 .match::after { display: none; }
    .half.right .e8 .match::after { display: none; }

    /* ─── Team slot ──────────────────────────────────────────────── */
    .team {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 6px;
      height: 22px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      z-index: 1;
      transition: background 0.15s, opacity 0.15s;
    }

    .team:first-child { border-radius: 3px 3px 0 0; border-bottom: none; }
    .team:last-child  { border-radius: 0 0 3px 3px; }

    .seed {
      font-size: 9px;
      font-weight: 700;
      color: #8b949e;
      min-width: 14px;
      text-align: right;
      flex-shrink: 0;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      font-size: 10.5px;
    }

    .result-icon {
      font-size: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ─── Pick highlights ────────────────────────────────────────── */
    .team.pick-fav {
      background: linear-gradient(90deg, #3a2d00, #4a3800);
      border-color: #ffd700;
      color: #ffd700;
      font-weight: 700;
    }
    .team.pick-fav .seed { color: #b8960c; }


    /* ─── Live result states ─────────────────────────────────────── */
    .team.live-won {
      border-color: #3fb950;
      box-shadow: inset 0 0 0 1px rgba(63,185,80,0.15);
    }

    .team.live-lost {
      background: #1a0a0a;
      border-color: #8b1a1a;
      color: #f85149;
      opacity: 0.75;
    }

    .team.live-lost .seed { color: #8b1a1a; }

    /* ─── Empty slot ─────────────────────────────────────────────── */
    .team.empty {
      color: #30363d;
      border-color: #21262d;
      background: #0d1117;
    }
    .team.empty .seed { color: #21262d; }

    /* ─── Round header label ─────────────────────────────────────── */
    .round-header {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8b949e;
      text-align: center;
      padding-bottom: 4px;
      font-weight: 600;
    }

    /* ─── Center finals column ───────────────────────────────────── */
    .center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      gap: 8px;
      min-height: 724px;
    }

    .finals-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 4px;
    }

    .championship-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .trophy { font-size: 28px; text-align: center; margin-bottom: 4px; }

    .champ-box {
      width: 130px;
      height: 28px;
      background: #1c2128;
      border: 2px solid #ffd700;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #ffd700;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .ff-match { display: flex; flex-direction: column; gap: 0; margin: 4px 0; }

    .ff-team {
      width: 130px;
      height: 26px;
      background: #161b22;
      border: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #8b949e;
    }
    .ff-team:first-child { border-radius: 3px 3px 0 0; border-bottom: none; }
    .ff-team:last-child  { border-radius: 0 0 3px 3px; }

    /* ─── Note ───────────────────────────────────────────────────── */
    .note-wrap { text-align: center; margin-top: 10px; }

    .note {
      text-align: center;
      color: #8b949e;
      font-size: 11px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 16px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>2026 NCAA Tournament</h1>
<p class="subtitle">My Bracket Picks</p>

<div class="status-bar">
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch swatch-fav"></div><span>Fav pick</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-won"></div><span>Won ✓</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-lost"></div><span>Eliminated ✗</span>
    </div>
  </div>
  <span class="divider">|</span>
  <button class="refresh-btn" id="refreshBtn" onclick="syncLive()">
    <span class="spin-icon" id="spinIcon">↻</span> Sync Live Results
  </button>
</div>

<div class="sync-status" id="syncStatus">Not synced yet — hit Sync to load live results</div>

<div class="bracket-scroll">
  <div id="bracket-root"></div>
</div>

<div class="note-wrap">
  <span class="note">
    ❌ <strong>Howard Bison</strong> was eliminated in the First Four and did not reach the main bracket.
    &nbsp;|&nbsp; <strong>Wisconsin</strong> noted with — (uncertain pick) but highlighted.
  </span>
</div>

<script>
// ─── Bracket data ─────────────────────────────────────────────────────
const regions = {
  East: [
    {s:1,  t:'Duke'},            {s:16, t:'Siena'},
    {s:8,  t:'Ohio State'},      {s:9,  t:'TCU'},
    {s:5,  t:"St. John's"},      {s:12, t:'Northern Iowa'},
    {s:4,  t:'Kansas'},          {s:13, t:'California Baptist'},
    {s:6,  t:'Louisville'},      {s:11, t:'South Florida'},
    {s:3,  t:'Michigan State'},  {s:14, t:'North Dakota State'},
    {s:7,  t:'UCLA'},            {s:10, t:'UCF'},
    {s:2,  t:'UConn'},           {s:15, t:'Furman'},
  ],
  West: [
    {s:1,  t:'Arizona'},         {s:16, t:'LIU'},
    {s:8,  t:'Villanova'},       {s:9,  t:'Utah State'},
    {s:5,  t:'Wisconsin'},       {s:12, t:'High Point'},
    {s:4,  t:'Arkansas'},        {s:13, t:'Hawaii'},
    {s:6,  t:'BYU'},             {s:11, t:'Texas'},
    {s:3,  t:'Gonzaga'},         {s:14, t:'Kennesaw State'},
    {s:7,  t:'Miami (FL)'},      {s:10, t:'Missouri'},
    {s:2,  t:'Purdue'},          {s:15, t:'Queens'},
  ],
  South: [
    {s:1,  t:'Florida'},         {s:16, t:'Prairie View A&M'},
    {s:8,  t:'Clemson'},         {s:9,  t:'Iowa'},
    {s:5,  t:'Vanderbilt'},      {s:12, t:'McNeese'},
    {s:4,  t:'Nebraska'},        {s:13, t:'Troy'},
    {s:6,  t:'North Carolina'},  {s:11, t:'VCU'},
    {s:3,  t:'Illinois'},        {s:14, t:'Penn'},
    {s:7,  t:"Saint Mary's"},    {s:10, t:'Texas A&M'},
    {s:2,  t:'Houston'},         {s:15, t:'Idaho'},
  ],
  Midwest: [
    {s:1,  t:'Michigan'},        {s:16, t:'UMBC'},
    {s:8,  t:'Georgia'},         {s:9,  t:'Saint Louis'},
    {s:5,  t:'Texas Tech'},      {s:12, t:'Akron'},
    {s:4,  t:'Alabama'},         {s:13, t:'Hofstra'},
    {s:6,  t:'Tennessee'},       {s:11, t:'Miami (OH)'},
    {s:3,  t:'Virginia'},        {s:14, t:'Wright State'},
    {s:7,  t:'Kentucky'},        {s:10, t:'Santa Clara'},
    {s:2,  t:'Iowa State'},      {s:15, t:'Tennessee State'},
  ],
};

// ─── User's picks ────────────────────────────────────────────────────
const favPicks = new Set([
  'Illinois','Kansas','Nebraska','Texas Tech','Wisconsin','Louisville',
  'Hofstra','Wright State','Tennessee State',
]);

function pickClass(name) {
  return favPicks.has(name) ? 'pick-fav' : '';
}

// ─── Build a team slot ───────────────────────────────────────────────
function teamSlot(team, isTop) {
  const cls  = team ? pickClass(team.t) : 'empty';
  const attr = team ? `data-team="${team.t.replace(/"/g, '&quot;')}"` : '';
  const seed = team ? `<span class="seed">${team.s}</span>` : `<span class="seed">–</span>`;
  const name = team ? `<span class="name">${team.t}</span>` : `<span class="name">TBD</span>`;
  const icon = `<span class="result-icon"></span>`;
  const radius = isTop
    ? 'border-radius:3px 3px 0 0;border-bottom:none;'
    : 'border-radius:0 0 3px 3px;';
  return `<div class="team ${cls}" style="${radius}" ${attr}>${seed}${name}${icon}</div>`;
}

function buildMatch(top, bot) {
  return `<div class="match">${teamSlot(top, true)}${teamSlot(bot, false)}</div>`;
}

function emptyMatch() {
  return `<div class="match">${teamSlot(null,true)}${teamSlot(null,false)}</div>`;
}

function buildRound(label, matchCount, teams) {
  const cls = label.toLowerCase().replace(' ','');
  const roundClass = { 'round1':'r1','round2':'r2','sweet16':'s16','elite8':'e8' }[cls] || 'r1';
  let matches = '';
  if (teams) {
    for (let i = 0; i < teams.length; i += 2) matches += buildMatch(teams[i], teams[i+1]);
  } else {
    for (let i = 0; i < matchCount; i++) matches += emptyMatch();
  }
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
      <div class="round-header">${label}</div>
      <div class="round-col ${roundClass}">${matches}</div>
    </div>`;
}

function buildRegionLeft(regionName, teams) {
  const lc = regionName.toLowerCase();
  return `
    <div class="region-block">
      <div class="region-label ${lc}">${regionName}</div>
      ${buildRound('Round 1', 8, teams)}
      ${buildRound('Round 2', 4)}
      ${buildRound('Sweet 16', 2)}
      ${buildRound('Elite 8', 1)}
    </div>`;
}

function buildRegionRight(regionName, teams) {
  const lc = regionName.toLowerCase();
  return `
    <div class="region-block">
      ${buildRound('Elite 8', 1)}
      ${buildRound('Sweet 16', 2)}
      ${buildRound('Round 2', 4)}
      ${buildRound('Round 1', 8, teams)}
      <div class="region-label ${lc}">${regionName}</div>
    </div>`;
}

function buildCenter() {
  return `
    <div class="center-col">
      <div class="finals-label">Final Four</div>
      <div class="ff-match">
        <div class="ff-team">TBD (East)</div>
        <div class="ff-team">TBD (South)</div>
      </div>
      <div style="height:32px;"></div>
      <div class="championship-area">
        <div class="trophy">🏆</div>
        <div class="finals-label">Championship</div>
        <div class="champ-box">2026 Champion</div>
        <div class="finals-label" style="margin-top:6px;">Apr 6 · San Antonio</div>
      </div>
      <div style="height:32px;"></div>
      <div class="ff-match">
        <div class="ff-team">TBD (West)</div>
        <div class="ff-team">TBD (Midwest)</div>
      </div>
      <div class="finals-label" style="margin-top:8px;">Final Four</div>
    </div>`;
}

// ─── Render bracket ───────────────────────────────────────────────────
document.getElementById('bracket-root').innerHTML = `
  <div class="bracket-outer">
    <div class="half left">
      ${buildRegionLeft('East',  regions.East)}
      ${buildRegionLeft('South', regions.South)}
    </div>
    ${buildCenter()}
    <div class="half right">
      ${buildRegionRight('West',    regions.West)}
      ${buildRegionRight('Midwest', regions.Midwest)}
    </div>
  </div>
`;

// ─── Live sync via ESPN public scoreboard API ─────────────────────────
async function syncLive() {
  const btn    = document.getElementById('refreshBtn');
  const icon   = document.getElementById('spinIcon');
  const status = document.getElementById('syncStatus');

  btn.disabled = true;
  icon.classList.add('spinning');
  status.className = 'sync-status';
  status.textContent = 'Fetching live results from ESPN…';

  try {
    // Fetch all tournament days in parallel (First Four through Final Four)
    // First round: Mar 19-20, Second round: Mar 21-22,
    // Sweet 16: Mar 26-27, Elite 8: Mar 28-29, FF: Apr 4-5, Champ: Apr 6
    const days = [
      '20260318','20260319','20260320','20260321','20260322','20260323',
      '20260326','20260327','20260328','20260329',
      '20260404','20260405','20260406',
    ];

    const fetches = days.map(d =>
      fetch(`https://site.api.espn.com/apis/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${d}&limit=100`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    );

    const allPages = await Promise.all(fetches);

    const winners = new Set();
    const losers  = new Set();

    for (const data of allPages) {
      if (!data?.events) continue;
      for (const event of data.events) {
        const comp = event.competitions?.[0];
        if (!comp) continue;
        const completed = event.status?.type?.completed;
        const inProgress = event.status?.type?.state === 'in';
        if (!completed && !inProgress) continue;

        for (const c of comp.competitors) {
          // Collect every name variant ESPN returns so fuzzy matching hits
          const names = [
            c.team?.shortDisplayName,
            c.team?.displayName,
            c.team?.location,
            c.team?.name,
            c.team?.abbreviation,
          ].filter(Boolean);

          if (completed) {
            if (c.winner) names.forEach(n => winners.add(n));
            else          names.forEach(n => losers.add(n));
          } else if (inProgress) {
            // In-progress: mark as still playing (won't dim them)
            names.forEach(n => winners.add(n));
          }
        }
      }
    }

    const matched = applyResults(winners, losers);
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    status.className = 'sync-status ok';
    status.textContent = `Synced ${now} — ${matched.won} advancing ✓, ${matched.lost} eliminated ✗`;

  } catch (err) {
    status.className = 'sync-status error';
    status.textContent = `Sync failed: ${err.message}`;
    console.error('syncLive error:', err);
  } finally {
    btn.disabled = false;
    icon.classList.remove('spinning');
  }
}

// ─── Fuzzy name matching ──────────────────────────────────────────────
function nameMatches(ourName, espnName) {
  // Normalize: lowercase, strip punctuation, collapse spaces
  const norm = s => s.toLowerCase().replace(/[''']/g, '').replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  const o = norm(ourName);
  const e = norm(espnName);
  if (o === e) return true;
  // Strip parentheticals like "(CA)", "(OH)", "(FL)", "(NY)"
  const eClean = e.replace(/\([^)]*\)/g, '').trim();
  if (o === eClean) return true;
  // One contains the other (minimum length guard to avoid false matches)
  if (o.length >= 4 && e.startsWith(o)) return true;
  if (e.length >= 4 && o.startsWith(e)) return true;
  // "St. John's" ↔ "Saint John's" etc.
  const abbrevMap = {
    'st ': 'saint ', 'mt ': 'mount ', 'n ': 'north ', 's ': 'south ',
    'e ': 'east ', 'w ': 'west ',
  };
  let oExp = o;
  for (const [short, long] of Object.entries(abbrevMap)) {
    if (o.startsWith(short)) { oExp = long + o.slice(short.length); break; }
  }
  if (oExp !== o && (eClean === oExp || e.startsWith(oExp))) return true;
  return false;
}

// ─── Apply winners / losers to the DOM ───────────────────────────────
function applyResults(winners, losers) {
  let wonCount = 0, lostCount = 0;

  document.querySelectorAll('.team[data-team]').forEach(el => {
    const ourName = el.dataset.team;
    const iconEl  = el.querySelector('.result-icon');
    el.classList.remove('live-won', 'live-lost');
    if (iconEl) iconEl.textContent = '';

    const isWon  = [...winners].some(w => nameMatches(ourName, w));
    const isLost = !isWon && [...losers].some(l => nameMatches(ourName, l));

    if (isWon) {
      el.classList.add('live-won');
      if (iconEl) iconEl.textContent = '✓';
      wonCount++;
    } else if (isLost) {
      el.classList.add('live-lost');
      if (iconEl) iconEl.textContent = '✗';
      lostCount++;
    }
  });

  return { won: wonCount, lost: lostCount };
}
</script>
</body>
</html>
