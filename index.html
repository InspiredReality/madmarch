<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 March Madness – My Picks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      min-height: 100vh;
      padding: 16px 8px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffd700;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 12px;
    }

    /* ─── Status bar: legend + refresh ──────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #8b949e;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .swatch-fav    { background: linear-gradient(135deg, #ffd700, #ffb300); }
    .swatch-upset  { background: linear-gradient(135deg, #ff6b35, #e64a19); }
    .swatch-normal { background: #161b22; border: 1px solid #30363d; }
    .swatch-won    { background: #0d1117; border: 1px solid #3fb950; }
    .swatch-lost   { background: #1a0a0a; border: 1px solid #8b1a1a; }

    .divider { color: #30363d; }

    .refresh-btn {
      background: #161b22;
      border: 1px solid #30363d;
      color: #58a6ff;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .refresh-btn:hover:not(:disabled) {
      background: #21262d;
      border-color: #58a6ff;
    }

    .refresh-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .spin-icon {
      display: inline-block;
      font-size: 14px;
      line-height: 1;
    }

    .spin-icon.spinning {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .sync-status {
      font-size: 11px;
      color: #8b949e;
      text-align: center;
      margin-top: 4px;
      min-height: 16px;
    }

    .sync-status.error { color: #f78166; }
    .sync-status.ok    { color: #3fb950; }

    /* ─── Calcutta profit table ──────────────────────────────────── */
    .profit-panel {
      max-width: 520px;
      margin: 14px auto 6px;
    }

    .profit-panel h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffd700;
      margin-bottom: 6px;
      text-align: center;
    }

    .profit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .profit-table th {
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 10px;
      border-bottom: 1px solid #30363d;
      text-align: right;
    }

    .profit-table th:first-child { text-align: left; }

    .profit-table td {
      padding: 5px 10px;
      border-bottom: 1px solid #21262d;
      text-align: right;
      color: #e6edf3;
    }

    .profit-table td:first-child { text-align: left; font-weight: 600; }

    .profit-table tbody tr:hover { background: #161b22; }

    .profit-table tfoot td {
      border-top: 1px solid #30363d;
      border-bottom: none;
      font-weight: 700;
      background: #161b22;
    }

    .profit-pos { color: #3fb950; }
    .profit-neg { color: #f78166; }
    .profit-zero { color: #8b949e; }

    /* ─── Scrollable bracket wrapper ────────────────────────────── */
    .bracket-scroll {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 16px;
    }

    .bracket-outer {
      display: inline-flex;   /* shrink-wrap to content width */
      align-items: flex-start;
      gap: 0;
      padding: 0 8px;
    }

    /* ─── Left / Right halves ────────────────────────────────────── */
    .half {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .region-block {
      display: flex;
    }


    /* ─── Region label ───────────────────────────────────────────── */
    .region-label {
      writing-mode: vertical-lr;
      text-transform: uppercase;
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 2px;
      color: #8b949e;
      padding: 6px 4px;
      text-align: center;
      user-select: none;
    }

    .region-label.east    { color: #58a6ff; }
    .region-label.west    { color: #3fb950; }
    .region-label.south   { color: #f78166; }
    .region-label.midwest { color: #d2a8ff; }

    /* ─── Round column ───────────────────────────────────────────── */
    .round-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      width: 148px;
      min-height: 352px;
      position: relative;
    }

    .round-col.r2  { min-height: 352px; width: 130px; }
    .round-col.s16 { min-height: 352px; width: 130px; }
    .round-col.e8  { min-height: 352px; width: 130px; }

    /* ─── Match ──────────────────────────────────────────────────── */
    .match {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .half.left .match::after {
      content: '';
      position: absolute;
      right: -1px; top: 25%;
      height: 50%; width: 0;
      border-right: 2px solid #30363d;
      border-top:   2px solid #30363d;
      border-bottom:2px solid #30363d;
      border-radius: 0 3px 3px 0;
      z-index: 0;
    }

    .half.right .match::after {
      content: '';
      position: absolute;
      left: -1px; top: 25%;
      height: 50%; width: 0;
      border-left:  2px solid #30363d;
      border-top:   2px solid #30363d;
      border-bottom:2px solid #30363d;
      border-radius: 3px 0 0 3px;
      z-index: 0;
    }

    .half.left  .e8 .match::after { display: none; }
    .half.right .e8 .match::after { display: none; }

    /* ─── Team slot ──────────────────────────────────────────────── */
    .team {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 6px;
      height: 22px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      z-index: 1;
      transition: background 0.15s, opacity 0.15s;
    }

    .team:first-child { border-radius: 3px 3px 0 0; border-bottom: none; }
    .team:last-child  { border-radius: 0 0 3px 3px; }

    .seed {
      font-size: 9px;
      font-weight: 700;
      color: #8b949e;
      min-width: 14px;
      text-align: right;
      flex-shrink: 0;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      font-size: 10.5px;
    }

    .result-icon {
      font-size: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ─── Pick highlights ────────────────────────────────────────── */
    .team.pick-fav {
      background: linear-gradient(90deg, #3a2d00, #4a3800);
      border-color: #ffd700;
      color: #ffd700;
      font-weight: 700;
    }
    .team.pick-fav .seed { color: #b8960c; }


    /* ─── Live result states ─────────────────────────────────────── */
    .team.live-won {
      border-color: #3fb950;
      box-shadow: inset 0 0 0 1px rgba(63,185,80,0.15);
    }

    .team.live-lost {
      background: #1a0a0a;
      border-color: #8b1a1a;
      color: #f85149;
      opacity: 0.75;
    }

    .team.live-lost .seed { color: #8b1a1a; }

    /* ─── Empty slot ─────────────────────────────────────────────── */
    .team.empty {
      color: #30363d;
      border-color: #21262d;
      background: #0d1117;
    }
    .team.empty .seed { color: #21262d; }

    /* ─── Round header label ─────────────────────────────────────── */
    .round-header {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8b949e;
      text-align: center;
      padding-bottom: 4px;
      font-weight: 600;
    }

    /* ─── Center finals column ───────────────────────────────────── */
    .center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      gap: 8px;
      min-height: 724px;
    }

    .finals-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 4px;
    }

    .championship-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .trophy { font-size: 28px; text-align: center; margin-bottom: 4px; }

    .champ-box {
      width: 130px;
      height: 28px;
      background: #1c2128;
      border: 2px solid #ffd700;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #ffd700;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .ff-match { display: flex; flex-direction: column; gap: 0; margin: 4px 0; }

    .ff-team {
      width: 130px;
      height: 26px;
      background: #161b22;
      border: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #8b949e;
    }
    .ff-team:first-child { border-radius: 3px 3px 0 0; border-bottom: none; }
    .ff-team:last-child  { border-radius: 0 0 3px 3px; }

    /* ─── Note ───────────────────────────────────────────────────── */
    .note-wrap { text-align: center; margin-top: 10px; }

    .note {
      text-align: center;
      color: #8b949e;
      font-size: 11px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 16px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>2026 NCAA Tournament</h1>
<p class="subtitle">My Bracket Picks</p>

<div class="status-bar">
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch swatch-fav"></div><span>Fav pick</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-won"></div><span>Won ✓</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-lost"></div><span>Eliminated ✗</span>
    </div>
  </div>
  <span class="divider">|</span>
  <button class="refresh-btn" id="refreshBtn" onclick="syncLive()">
    <span class="spin-icon" id="spinIcon">↻</span> Sync Live Results
  </button>
</div>

<div class="sync-status" id="syncStatus">Not synced yet — hit Sync to load live results</div>

<div class="profit-panel" id="profitPanel" style="display:none">
  <h2>Calcutta Profit Tracker</h2>
  <table class="profit-table">
    <thead>
      <tr>
        <th>Team</th>
        <th>Cost</th>
        <th>Wins</th>
        <th>Earnings</th>
        <th>Profit</th>
      </tr>
    </thead>
    <tbody id="profitBody"></tbody>
    <tfoot id="profitFoot"></tfoot>
  </table>
</div>

<div class="bracket-scroll">
  <div id="bracket-root"></div>
</div>

<script>
// ─── Bracket data ─────────────────────────────────────────────────────
const regions = {
  East: [
    {s:1,  t:'Duke'},            {s:16, t:'Siena'},
    {s:8,  t:'Ohio State'},      {s:9,  t:'TCU'},
    {s:5,  t:"St. John's"},      {s:12, t:'Northern Iowa'},
    {s:4,  t:'Kansas'},          {s:13, t:'California Baptist'},
    {s:6,  t:'Louisville'},      {s:11, t:'South Florida'},
    {s:3,  t:'Michigan State'},  {s:14, t:'North Dakota State'},
    {s:7,  t:'UCLA'},            {s:10, t:'UCF'},
    {s:2,  t:'UConn'},           {s:15, t:'Furman'},
  ],
  West: [
    {s:1,  t:'Arizona'},         {s:16, t:'LIU'},
    {s:8,  t:'Villanova'},       {s:9,  t:'Utah State'},
    {s:5,  t:'Wisconsin'},       {s:12, t:'High Point'},
    {s:4,  t:'Arkansas'},        {s:13, t:'Hawaii'},
    {s:6,  t:'BYU'},             {s:11, t:'Texas'},
    {s:3,  t:'Gonzaga'},         {s:14, t:'Kennesaw State'},
    {s:7,  t:'Miami (FL)'},      {s:10, t:'Missouri'},
    {s:2,  t:'Purdue'},          {s:15, t:'Queens'},
  ],
  South: [
    {s:1,  t:'Florida'},         {s:16, t:'Prairie View A&M'},
    {s:8,  t:'Clemson'},         {s:9,  t:'Iowa'},
    {s:5,  t:'Vanderbilt'},      {s:12, t:'McNeese'},
    {s:4,  t:'Nebraska'},        {s:13, t:'Troy'},
    {s:6,  t:'North Carolina'},  {s:11, t:'VCU'},
    {s:3,  t:'Illinois'},        {s:14, t:'Penn'},
    {s:7,  t:"Saint Mary's"},    {s:10, t:'Texas A&M'},
    {s:2,  t:'Houston'},         {s:15, t:'Idaho'},
  ],
  Midwest: [
    {s:1,  t:'Michigan'},        {s:16, t:'UMBC'},
    {s:8,  t:'Georgia'},         {s:9,  t:'Saint Louis'},
    {s:5,  t:'Texas Tech'},      {s:12, t:'Akron'},
    {s:4,  t:'Alabama'},         {s:13, t:'Hofstra'},
    {s:6,  t:'Tennessee'},       {s:11, t:'Miami (OH)'},
    {s:3,  t:'Virginia'},        {s:14, t:'Wright State'},
    {s:7,  t:'Kentucky'},        {s:10, t:'Santa Clara'},
    {s:2,  t:'Iowa State'},      {s:15, t:'Tennessee State'},
  ],
};

// ─── User's picks ────────────────────────────────────────────────────
const favPicks = new Set([
  'Illinois','Kansas','Nebraska','Texas Tech','Wisconsin','Louisville',
  'Hofstra','Wright State','Tennessee State',
]);

function pickClass(name) {
  return favPicks.has(name) ? 'pick-fav' : '';
}

// ─── Build a team slot ───────────────────────────────────────────────
function teamSlot(team, isTop) {
  const cls  = team ? pickClass(team.t) : 'empty';
  const attr = team ? `data-team="${team.t.replace(/"/g, '&quot;')}"` : '';
  const seed = team ? `<span class="seed">${team.s}</span>` : `<span class="seed">–</span>`;
  const name = team ? `<span class="name">${team.t}</span>` : `<span class="name">TBD</span>`;
  const icon = `<span class="result-icon"></span>`;
  const radius = isTop
    ? 'border-radius:3px 3px 0 0;border-bottom:none;'
    : 'border-radius:0 0 3px 3px;';
  return `<div class="team ${cls}" style="${radius}" ${attr}>${seed}${name}${icon}</div>`;
}

function buildMatch(top, bot) {
  return `<div class="match">${teamSlot(top, true)}${teamSlot(bot, false)}</div>`;
}

function buildRound(label, matchups) {
  const cls = label.toLowerCase().replace(' ', '');
  const roundClass = { 'round1':'r1','round2':'r2','sweet16':'s16','elite8':'e8' }[cls] || 'r1';
  const matches = matchups.map(([t, b]) => buildMatch(t, b)).join('');
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
      <div class="round-header">${label}</div>
      <div class="round-col ${roundClass}">${matches}</div>
    </div>`;
}

// ─── Compute all rounds from R1 seeds + known results ────────────────
// For each round, determine which team advanced by checking who their
// opponent was eliminated (appears in losers).
function computeRounds(teams16, losers) {
  const out = name => [...losers].some(l => nameMatches(name, l));

  // Who won the game between t1 and t2?
  function winner(t1, t2) {
    if (!t1 || !t2) return null;    // one side TBD → can't resolve
    if (out(t1.t)) return t2;
    if (out(t2.t)) return t1;
    return null;                    // game not yet played
  }

  const r1 = Array.from({length: 8}, (_, i) => [teams16[i*2], teams16[i*2+1]]);
  const r2  = Array.from({length: 4}, (_, i) => [winner(r1[i*2][0], r1[i*2][1]),
                                                   winner(r1[i*2+1][0], r1[i*2+1][1])]);
  const s16 = Array.from({length: 2}, (_, i) => [winner(r2[i*2][0], r2[i*2][1]),
                                                   winner(r2[i*2+1][0], r2[i*2+1][1])]);
  const e8  = [[winner(s16[0][0], s16[0][1]), winner(s16[1][0], s16[1][1])]];
  return { r1, r2, s16, e8 };
}

function buildRegionLeft(regionName, rounds) {
  const lc = regionName.toLowerCase();
  return `
    <div class="region-block">
      <div class="region-label ${lc}">${regionName}</div>
      ${buildRound('Round 1', rounds.r1)}
      ${buildRound('Round 2', rounds.r2)}
      ${buildRound('Sweet 16', rounds.s16)}
      ${buildRound('Elite 8', rounds.e8)}
    </div>`;
}

function buildRegionRight(regionName, rounds) {
  const lc = regionName.toLowerCase();
  return `
    <div class="region-block">
      ${buildRound('Elite 8', rounds.e8)}
      ${buildRound('Sweet 16', rounds.s16)}
      ${buildRound('Round 2', rounds.r2)}
      ${buildRound('Round 1', rounds.r1)}
      <div class="region-label ${lc}">${regionName}</div>
    </div>`;
}

function buildCenter(ff) {
  const slot = (team, label) => team
    ? `<div class="ff-team">${team.s} ${team.t}</div>`
    : `<div class="ff-team">TBD (${label})</div>`;
  return `
    <div class="center-col">
      <div class="finals-label">Final Four</div>
      <div class="ff-match">
        ${slot(ff.east,    'East')}
        ${slot(ff.south,   'South')}
      </div>
      <div style="height:32px;"></div>
      <div class="championship-area">
        <div class="trophy">🏆</div>
        <div class="finals-label">Championship</div>
        <div class="champ-box">2026 Champion</div>
        <div class="finals-label" style="margin-top:6px;">Apr 6 · San Antonio</div>
      </div>
      <div style="height:32px;"></div>
      <div class="ff-match">
        ${slot(ff.west,    'West')}
        ${slot(ff.midwest, 'Midwest')}
      </div>
      <div class="finals-label" style="margin-top:8px;">Final Four</div>
    </div>`;
}

// ─── Calcutta profit tracker ──────────────────────────────────────────
const ROUND_PRIZE = [8.4, 16.8, 33.6, 67.2, 134.4, 268.8]; // R1 win … Championship win

const calcuttaCosts = {
  'Illinois':   45,
  'Kansas':     20,
  'Nebraska':   24,
  'Wisconsin':  15,
  'Louisville': 20,
  'Texas Tech': 25,
};

// Returns a map of { teamName → wins } for every team that advanced
function buildTeamWins(losers) {
  const allRounds = {
    East:    computeRounds(regions.East,    losers),
    South:   computeRounds(regions.South,   losers),
    West:    computeRounds(regions.West,    losers),
    Midwest: computeRounds(regions.Midwest, losers),
  };

  const wins = {};
  const bump = (team, n) => { if (team) wins[team.t] = Math.max(wins[team.t] ?? 0, n); };

  // Scan each region: r2 appearances = 1 win, s16 = 2, e8 = 3
  for (const rounds of Object.values(allRounds)) {
    for (const [t, b] of rounds.r2)  { bump(t, 1); bump(b, 1); }
    for (const [t, b] of rounds.s16) { bump(t, 2); bump(b, 2); }
    const [e8t, e8b] = rounds.e8[0];
    bump(e8t, 3); bump(e8b, 3);
  }

  // E8 winners (went to Final Four) = 4 wins
  // FF pairings: East vs South, West vs Midwest
  const e8Win = (rounds) => {
    const [t, b] = rounds.e8[0];
    if (!t || !b) return null;
    if ([...losers].some(l => nameMatches(t.t, l))) return b;
    if ([...losers].some(l => nameMatches(b.t, l))) return t;
    return null;
  };
  const ffWin = (a, b) => {
    if (!a || !b) return null;
    if ([...losers].some(l => nameMatches(a.t, l))) return b;
    if ([...losers].some(l => nameMatches(b.t, l))) return a;
    return null;
  };

  const e8East = e8Win(allRounds.East);    bump(e8East,    4);
  const e8South = e8Win(allRounds.South);  bump(e8South,   4);
  const e8West  = e8Win(allRounds.West);   bump(e8West,    4);
  const e8Mid   = e8Win(allRounds.Midwest);bump(e8Mid,     4);

  const ff1 = ffWin(e8East,  e8South); bump(ff1, 5); // East/South FF winner
  const ff2 = ffWin(e8West,  e8Mid);   bump(ff2, 5); // West/Midwest FF winner
  const champ = ffWin(ff1, ff2);       bump(champ, 6);

  return wins;
}

function renderProfitTable(losers) {
  const teamWins = buildTeamWins(losers);

  // Match calcutta team name → wins using fuzzy nameMatches
  const winsFor = (name) => {
    for (const [bracketName, w] of Object.entries(teamWins)) {
      if (nameMatches(name, bracketName) || nameMatches(bracketName, name)) return w;
    }
    return 0;
  };

  let totalCost = 0, totalEarnings = 0;
  const rows = Object.entries(calcuttaCosts).map(([name, cost]) => {
    const w        = winsFor(name);
    const earnings = ROUND_PRIZE.slice(0, w).reduce((a, b) => a + b, 0);
    const profit   = earnings - cost;
    totalCost     += cost;
    totalEarnings += earnings;

    const profitCls = profit > 0 ? 'profit-pos' : profit < 0 ? 'profit-neg' : 'profit-zero';
    const profitStr = (profit >= 0 ? '+' : '') + '$' + Math.abs(profit).toFixed(2);
    return `<tr>
      <td>${name}</td>
      <td>$${cost.toFixed(2)}</td>
      <td>${w}</td>
      <td>$${earnings.toFixed(2)}</td>
      <td class="${profitCls}">${profitStr}</td>
    </tr>`;
  });

  const totalProfit   = totalEarnings - totalCost;
  const totalCls      = totalProfit > 0 ? 'profit-pos' : totalProfit < 0 ? 'profit-neg' : 'profit-zero';
  const totalProfitStr = (totalProfit >= 0 ? '+' : '') + '$' + Math.abs(totalProfit).toFixed(2);

  document.getElementById('profitBody').innerHTML = rows.join('');
  document.getElementById('profitFoot').innerHTML = `<tr>
    <td colspan="3">Total</td>
    <td>$${totalEarnings.toFixed(2)}</td>
    <td class="${totalCls}">${totalProfitStr}</td>
  </tr>`;
  document.getElementById('profitPanel').style.display = '';
}

// ─── Full bracket render (called initially + after each sync) ─────────
function renderBracket(losers = new Set()) {
  const east    = computeRounds(regions.East,    losers);
  const south   = computeRounds(regions.South,   losers);
  const west    = computeRounds(regions.West,     losers);
  const midwest = computeRounds(regions.Midwest,  losers);

  // Final Four teams are E8 winners — determined the same way
  const ffWinner = (rounds, opponentLosers) => {
    const [t, b] = rounds.e8[0];
    if (!t || !b) return null;
    if ([...opponentLosers].some(l => nameMatches(t.t, l))) return b;
    if ([...opponentLosers].some(l => nameMatches(b.t, l))) return t;
    return null;
  };

  document.getElementById('bracket-root').innerHTML = `
    <div class="bracket-outer">
      <div class="half left">
        ${buildRegionLeft('East',  east)}
        ${buildRegionLeft('South', south)}
      </div>
      ${buildCenter({ east: ffWinner(east, losers), south: ffWinner(south, losers),
                      west: ffWinner(west, losers), midwest: ffWinner(midwest, losers) })}
      <div class="half right">
        ${buildRegionRight('West',    west)}
        ${buildRegionRight('Midwest', midwest)}
      </div>
    </div>
  `;
}

// Initial render with no results yet
renderBracket();

// ─── Live sync via NCAA bracket API (ncaa.com MML data) ──────────────
async function syncLive() {
  const btn    = document.getElementById('refreshBtn');
  const icon   = document.getElementById('spinIcon');
  const status = document.getElementById('syncStatus');

  btn.disabled = true;
  icon.classList.add('spinning');
  status.className = 'sync-status';
  status.textContent = 'Fetching live results…';

  try {
    const winners = new Set();
    const losers  = new Set();
    const sourcesHit = [];

    // ── Source 1: henrygd NCAA API (CORS proxy for ncaa.com MML bracket) ──
    // Single request returns all rounds — final games have gameState:"F" + isWinner
    const bracketData = await fetch('https://ncaa-api.henrygd.me/brackets/basketball-men/d1/2026')
      .then(r => r.ok ? r.json() : null).catch(() => null);

    if (bracketData) {
      const n = parseNCAA(bracketData, winners, losers);
      if (n > 0) sourcesHit.push(`NCAA (${n} results)`);
    }

    // ── Source 2: ESPN tournament scoreboard (groups=100 = NCAA tournament only) ──
    // Catches live in-progress games the bracket feed may not reflect yet
    const espnBase = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=100&limit=200';
    const espnUrls = [
      espnBase,
      ...['20260319','20260320','20260321','20260322','20260323','20260326',
          '20260327','20260328','20260329','20260404','20260405','20260406'].map(d =>
        `${espnBase}&dates=${d}`
      ),
    ];
    const espnPages = await Promise.all(
      espnUrls.map(u => fetch(u).then(r => r.ok ? r.json() : null).catch(() => null))
    );
    let espnCount = 0;
    for (const data of espnPages) {
      if (!data?.events) continue;
      for (const event of data.events) {
        const comp = event.competitions?.[0];
        if (!comp) continue;
        const state  = event.status?.type?.state;
        const isDone = event.status?.type?.completed === true || state === 'post';
        const isLive = state === 'in';
        if (!isDone && !isLive) continue;
        for (const c of comp.competitors) {
          const names = [c.team?.shortDisplayName, c.team?.displayName,
                         c.team?.location, c.team?.name].filter(Boolean);
          if (isDone) {
            if (c.winner) names.forEach(n => winners.add(n));
            else          names.forEach(n => losers.add(n));
          } else {
            names.forEach(n => winners.add(n));
          }
          espnCount++;
        }
      }
    }
    if (espnCount > 0) sourcesHit.push(`ESPN (${espnCount} teams)`);

    console.log('[sync] sources:', sourcesHit.join(', '));
    console.log('[sync] winners:', [...winners].slice(0,15));
    console.log('[sync] losers:',  [...losers].slice(0,15));

    renderBracket(losers);
    renderProfitTable(losers);
    const matched = applyResults(winners, losers);
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const src  = sourcesHit.length ? ` · ${sourcesHit.join(', ')}` : ' · no results found';
    status.className = 'sync-status ok';
    status.textContent = `Synced ${now} — ${matched.won} advancing ✓, ${matched.lost} eliminated ✗${src}`;

  } catch (err) {
    renderBracket(new Set());
    renderProfitTable(new Set());
    applyResults(new Set(), new Set());
    status.className = 'sync-status error';
    status.textContent = `Sync failed — check console for details`;
    console.error('syncLive error:', err);
  } finally {
    btn.disabled = false;
    icon.classList.remove('spinning');
  }
}

// Auto-sync on page load
window.addEventListener('DOMContentLoaded', () => setTimeout(syncLive, 800));

// ─── NCAA data parsers (henrygd API mirrors ncaa.com format) ─────────
// Handles both scoreboard.json and bracket endpoint responses.
// Returns number of game results successfully parsed.
function parseNCAA(data, winners, losers) {
  let count = 0;

  // Walk any object recursively collecting game nodes
  function walk(node) {
    if (!node || typeof node !== 'object') return;

    // Scoreboard format: { scoreboard: { games: [ { game: { teams, gameState } } ] } }
    const gameState = node.gameState || node.game_state || '';
    const isFinal   = /final/i.test(gameState) || gameState === 'F';

    if (isFinal && (node.teams || node.home || node.away)) {
      // Try { teams: { home, away } } structure
      const home = node.teams?.home ?? node.home;
      const away = node.teams?.away ?? node.away;
      if (home && away) {
        const hName  = home.names?.short ?? home.name ?? home.nameShort ?? '';
        const aName  = away.names?.short ?? away.name ?? away.nameShort ?? '';
        // Explicit winner field, or fall back to score comparison
        const hScore = parseFloat(home.score ?? home.currentScore ?? 0);
        const aScore = parseFloat(away.score ?? away.currentScore ?? 0);
        const hWon   = home.isWinner === true || home.winner === true || home.winner === 'W'
                       || (hScore > 0 && aScore > 0 && hScore > aScore);
        if (hName) { (hWon ? winners : losers).add(hName); count++; }
        if (aName) { (hWon ? losers : winners).add(aName); count++; }
        return; // don't recurse into resolved game
      }
      // Try array-of-teams structure
      if (Array.isArray(node.teams)) {
        const scored = node.teams.filter(t => parseFloat(t.score ?? 0) > 0);
        const winTeam = scored.length === 2
          ? (parseFloat(scored[0].score) > parseFloat(scored[1].score) ? scored[0] : scored[1])
          : null;
        for (const t of node.teams) {
          const nm  = t.names?.short ?? t.name ?? t.nameShort ?? '';
          const won = t.isWinner === true || t.winner === true || t.winner === 'W' || t === winTeam;
          if (nm) { (won ? winners : losers).add(nm); count++; }
        }
        return;
      }
    }

    // Recurse into arrays and objects
    if (Array.isArray(node)) {
      node.forEach(walk);
    } else {
      Object.values(node).forEach(v => { if (v && typeof v === 'object') walk(v); });
    }
  }

  walk(data);
  return count;
}

// ─── Fuzzy name matching ──────────────────────────────────────────────
function nameMatches(ourName, espnName) {
  // Normalize: lowercase, strip punctuation, collapse spaces
  const norm = s => s.toLowerCase().replace(/[''']/g, '').replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  const o = norm(ourName);
  const e = norm(espnName);
  if (o === e) return true;
  // Strip parentheticals like "(CA)", "(OH)", "(FL)", "(NY)"
  const eClean = e.replace(/\([^)]*\)/g, '').trim();
  if (o === eClean) return true;
  // Prefix match — guard requires ≥9 chars to avoid "Iowa"↔"Iowa State",
  // "Texas"↔"Texas A&M", "Michigan"↔"Michigan State" false positives.
  // Short names (UCLA, UConn, etc.) rely on the exact-match path above.
  if (o.length >= 9 && e.startsWith(o)) return true;
  if (e.length >= 9 && o.startsWith(e)) return true;
  // "St. John's" ↔ "Saint John's" etc.
  const abbrevMap = {
    'st ': 'saint ', 'mt ': 'mount ', 'n ': 'north ', 's ': 'south ',
    'e ': 'east ', 'w ': 'west ',
  };
  let oExp = o;
  for (const [short, long] of Object.entries(abbrevMap)) {
    if (o.startsWith(short)) { oExp = long + o.slice(short.length); break; }
  }
  if (oExp !== o && (eClean === oExp || e.startsWith(oExp))) return true;
  return false;
}

// ─── Apply winners / losers to the DOM ───────────────────────────────
function applyResults(winners, losers) {
  let wonCount = 0, lostCount = 0;

  document.querySelectorAll('.team[data-team]').forEach(el => {
    const ourName = el.dataset.team;
    const iconEl  = el.querySelector('.result-icon');
    el.classList.remove('live-won', 'live-lost');
    if (iconEl) iconEl.textContent = '';

    const isWon  = [...winners].some(w => nameMatches(ourName, w));
    const isLost = !isWon && [...losers].some(l => nameMatches(ourName, l));

    if (isWon) {
      el.classList.add('live-won');
      if (iconEl) iconEl.textContent = '✓';
      wonCount++;
    } else if (isLost) {
      el.classList.add('live-lost');
      if (iconEl) iconEl.textContent = '✗';
      lostCount++;
    }
  });

  return { won: wonCount, lost: lostCount };
}
